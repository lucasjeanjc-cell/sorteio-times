<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sorteio de Times</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="logo-container">
  <img src="logo.png" alt="Logo" class="logo">
</div>

<div class="container">

  <h1>⚽ Sorteio de Times</h1>

  <div class="card">
    <h2>Adicionar Jogador</h2>

    <input type="text" id="nome" placeholder="Nome do jogador">

    <select id="estrelas">
      <option value="1">⭐</option>
      <option value="2">⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
    </select>

    <button id="btnAdicionar">Adicionar</button>
  </div>

  <div class="card">
    <h3>Jogadores</h3>
    <ul id="listaJogadores"></ul>
  </div>

  <button class="sortear" onclick="sortearTimes()">Sortear Times</button>

  <div id="times" class="times"></div>

</div>

<script src="script.js"></script>
</body>
</html>
